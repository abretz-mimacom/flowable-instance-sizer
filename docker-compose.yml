version: '3.4'

services:
  flowable-db:
    image: postgres:12.3
    ports:
      - 5432:5432
    volumes:
      - data_inst_sz_db:/var/lib/postgresql/data
      # - $HOME/basedumps/:/var/lib/postgresql/
      - $PWD/wal_archive:/wal_archive
      - $PWD/backups:/backups
    environment:
      - POSTGRES_MULTIPLE_DATABASES=keycloak,internal
      - POSTGRES_DB=flowable
      - POSTGRES_USER=flowable
      - POSTGRES_PASSWORD=flowable
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "flowable", "-U", "flowable" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: postgres -c wal_level=replica -c max_wal_senders=5 -c archive_mode=on -c "archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f" & tail -f /dev/null

#  flowable-db-restore:
#    image: postgres:12.3
#    ports:
#        - 5432:5432
#    depends_on:
#      flowable-db:
#        condition: service_healthy
#    volumes:
#      - $PWD/restore_data:/var/lib/postgresql/data
#      - $PWD/wal_archive:/wal_archive:ro

  flowable-index:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
    environment:
      discovery.type: single-node
      node.name: flowable-node-01
      cluster.name: flowable-cluster
      xpack.security.enabled: "false"
    ports:
      - 9300:9300
      - 9200:9200
    volumes:
      - data_inst_sz_index:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://host.docker.internal:9200"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s

  flowable-messaging:
    image: apache/activemq-artemis
    platform: linux/arm64
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: test
      ANONYMOUS_LOGIN: true
      EXTRA_ARGS: "--nio --host 0.0.0.0 --http-host 0.0.0.0 --relax-jolokia"
    ports:
      - 61616:61616
      - 61613:61613
      - 8161:8161

  flowable-engage:
    image: repo.flowable.com/docker/flowable/flowable-work:2025.2.02
    environment:
      flowable.license.db-store-enabled: true
      flowable.inspect.enabled: true
      info.env.name: Development
      logging.file.name: flowable-engage.log
      management.elastic.metrics.export.enabled: "true"
      management.endpoints.web.exposure.include: "*"
      management.endpoint.health.show-details: ALWAYS
      server.servlet.context-path: /
#      spring.artemis.broker-url: tcp://host.docker.internal:61616
      spring.elasticsearch.uris: http://host.docker.internal:9200
      spring.datasource.driver-class-name: org.postgresql.Driver
      spring.datasource.url: jdbc:postgresql://host.docker.internal:5432/flowable
      spring.datasource.username: flowable
      flowable.platform.idm.minimal-setup: false
      
    ports:
      - 8090:8080
    volumes:
      - $HOME/.flowable/flowable.license:/home/flowable/.flowable/flowable.license:ro
    depends_on:
      flowable-db:
        condition: service_healthy
      flowable-index:
        condition: service_healthy
      flowable-messaging:
        condition: service_started
#
#  # Vanilla Flowable Design, uncomment to activate
#  # This image requires to login to the Flowable Docker Repo (docker login repo.flowable.com)
  flowable-design:
    image: repo.flowable.com/docker/flowable/flowable-design:2025.2.02
    environment:
      flowable.design.remote.authentication.user: admin
      flowable.design.remote.authentication.password: test
      flowable.design.remote.idm-url: http://host.docker.internal:8090
      flowable.design.deployment-api-url: http://host.docker.internal:8090/app-api # not yet working for linux systems, check https://github.com/docker/for-linux/issues/264 for PR state and workarounds
      flowable.design.undeployment-api-url: http://host.docker.internal:8090/platform-api/app-deployments # not yet working for linux systems, check https://github.com/docker/for-linux/issues/264 for PR state and workarounds
      flowable.design.db-store-enabled: "false"
      logging.file: flowable-design.log
      server.servlet.context-path: /
      spring.datasource.driver-class-name: org.postgresql.Driver
      spring.datasource.url: jdbc:postgresql://host.docker.internal:5432/flowable
      spring.datasource.username: flowable
      spring.datasource.password: flowable

    ports:
      - 8091:8080
    volumes:
      - $HOME/.flowable/flowable.license:/home/flowable/.flowable/flowable.license:ro
    depends_on:
      flowable-db:
        condition: service_healthy
#
#  # Vanilla Flowable Control, uncomment to activate
#  # This image requires to login to the Flowable Docker Repo (docker login repo.flowable.com)
  flowable-control:
    image: repo.flowable.com/docker/flowable/flowable-control:2025.2.02
    environment:
      flowable.control.app.cluster-config.server-address: http://host.docker.internal # not yet working for linux systems, check https://github.com/docker/for-linux/issues/264 for pr state and workarounds
      flowable.control.app.cluster-config.port: 8090
      flowable.control.app.cluster-config.password: test
      flowable.control.app.db-store-enabled: "false"
      logging.file: flowable-control.log
      server.servlet.context-path: /
      spring.datasource.driver-class-name: org.postgresql.Driver
      spring.datasource.url: jdbc:postgresql://host.docker.internal:5432/flowable
      spring.datasource.username: flowable
      spring.datasource.password: flowable
    ports:
      - 8092:8080
    volumes:
      - $HOME/.flowable/flowable.license:/home/flowable/.flowable/flowable.license:ro
    depends_on:
      flowable-db:
        condition: service_healthy

# Volumes will get a prefix based on the `.env` file and data can be cleared by `docker-compose down -v`
volumes:
  data_inst_sz_db:
  data_inst_sz_index:
